<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<defs>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D1A5E"/>
      <stop offset="100%" stop-color="#1A0A2E"/>
    </linearGradient>
    <linearGradient id="purple3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#BB77EE"/>
      <stop offset="100%" stop-color="#7B3DAA"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M200,24 L356,82 L356,240 Q356,336 200,386 Q44,336 44,240 L44,82 Z" fill="#00000044" transform="translate(3,3)"/>
  <path d="M200,20 L360,80 L360,240 Q360,340 200,390 Q40,340 40,240 L40,80 Z" fill="url(#g3)" stroke="#7B3DAA" stroke-width="5"/>
  <path d="M200,34 L348,90 L348,238 Q348,330 200,376 Q52,330 52,238 L52,90 Z" fill="none" stroke="#7B3DAA44" stroke-width="1.5"/>

  <!-- Large flame -->
  <g transform="translate(200,175)" filter="url(#glow3)">
    <path d="M0,-130 C25,-90 65,-50 65,10 C65,50 35,80 0,85 C-35,80 -65,50 -65,10 C-65,-50 -25,-90 0,-130Z" fill="url(#purple3)" opacity="0.7"/>
    <path d="M0,-85 C15,-60 40,-30 40,10 C40,35 22,52 0,55 C-22,52 -40,35 -40,10 C-40,-30 -15,-60 0,-85Z" fill="#FFFFFF"/>
  </g>

  <!-- F letter -->
  <text x="200" y="195" text-anchor="middle" font-family="'Futura','Helvetica Neue',sans-serif" font-weight="800" font-size="56" fill="#2D1845">F</text>

  <!-- FIRE ST. -->
  <text x="200" y="300" text-anchor="middle" font-family="'Futura','Helvetica Neue',sans-serif" font-weight="700" font-size="24" fill="#FFFFFF" letter-spacing="6">FIRE ST.</text>

  <!-- Japanese -->
  <text x="200" y="340" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="300" font-size="11" fill="#BB77EE88" letter-spacing="2">ファイヤー通り高等学院</text>
</svg>