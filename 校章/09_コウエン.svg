<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<defs>
    <linearGradient id="g9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>
    <linearGradient id="silver9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CCCCCC"/>
      <stop offset="50%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#AAAAAA"/>
    </linearGradient>
  </defs>

  <path d="M200,24 L356,82 L356,240 Q356,336 200,386 Q44,336 44,240 L44,82 Z" fill="#00000044" transform="translate(3,3)"/>
  <path d="M200,20 L360,80 L360,240 Q360,340 200,390 Q40,340 40,240 L40,80 Z" fill="url(#g9)" stroke="url(#silver9)" stroke-width="5"/>
  <path d="M200,34 L348,90 L348,238 Q348,330 200,376 Q52,330 52,238 L52,90 Z" fill="none" stroke="#FFFFFF22" stroke-width="1.5"/>

  <!-- Theater masks -->
  <g transform="translate(200,155)">
    <!-- Happy mask -->
    <g transform="translate(-30,-5) rotate(-8)">
      <ellipse cx="0" cy="0" rx="35" ry="40" fill="url(#silver9)"/>
      <ellipse cx="-12" cy="-10" rx="5" ry="7" fill="#222"/>
      <ellipse cx="12" cy="-10" rx="5" ry="7" fill="#222"/>
      <path d="M-15,8 Q0,25 15,8" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Sad mask -->
    <g transform="translate(30,5) rotate(8)">
      <ellipse cx="0" cy="0" rx="35" ry="40" fill="#999"/>
      <ellipse cx="-12" cy="-10" rx="5" ry="7" fill="#222"/>
      <ellipse cx="12" cy="-10" rx="5" ry="7" fill="#222"/>
      <path d="M-15,15 Q0,2 15,15" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Quill pen -->
  <g transform="translate(200,140) rotate(25)">
    <path d="M0,-65 L4,-10 L0,30 L-4,-10 Z" fill="#DDDDDD"/>
    <line x1="0" y1="30" x2="0" y2="50" stroke="#AAAAAA" stroke-width="1.5"/>
  </g>

  <!-- KOEN -->
  <text x="200" y="270" text-anchor="middle" font-family="'Didot','Georgia','Times',serif" font-weight="400" font-size="32" fill="url(#silver9)" letter-spacing="8">KOEN</text>
  <text x="200" y="305" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="300" font-size="12" fill="#FFFFFF55" letter-spacing="2">公園通り学院</text>

  <!-- Decorative dots -->
  <g fill="url(#silver9)" opacity="0.4">
    <circle cx="160" cy="335" r="3"/>
    <circle cx="180" cy="335" r="3"/>
    <circle cx="200" cy="335" r="3"/>
    <circle cx="220" cy="335" r="3"/>
    <circle cx="240" cy="335" r="3"/>
  </g>
</svg>