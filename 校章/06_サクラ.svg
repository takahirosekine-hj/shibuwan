<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<defs>
    <linearGradient id="gold6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C84A"/>
      <stop offset="40%" stop-color="#F5E080"/>
      <stop offset="100%" stop-color="#B8900C"/>
    </linearGradient>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1610"/>
      <stop offset="100%" stop-color="#120C08"/>
    </linearGradient>
  </defs>

  <circle cx="200" cy="200" r="178" fill="#00000033" transform="translate(2,2)"/>
  <circle cx="200" cy="200" r="178" fill="url(#bg6)" stroke="url(#gold6)" stroke-width="6"/>
  <circle cx="200" cy="200" r="168" fill="none" stroke="url(#gold6)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="200" cy="200" r="163" fill="none" stroke="url(#gold6)" stroke-width="0.8" opacity="0.3"/>

  <!-- Cherry blossom - 5 petals -->
  <g transform="translate(200,155)">
    <g fill="url(#gold6)">
      <ellipse cx="0" cy="-38" rx="16" ry="28" transform="rotate(0,0,0)"/>
      <ellipse cx="36" cy="-12" rx="16" ry="28" transform="rotate(72,0,0)"/>
      <ellipse cx="22" cy="31" rx="16" ry="28" transform="rotate(144,0,0)"/>
      <ellipse cx="-22" cy="31" rx="16" ry="28" transform="rotate(216,0,0)"/>
      <ellipse cx="-36" cy="-12" rx="16" ry="28" transform="rotate(288,0,0)"/>
    </g>
    <circle cx="0" cy="0" r="12" fill="#1E1610"/>
    <circle cx="0" cy="0" r="5" fill="url(#gold6)"/>
  </g>

  <!-- SAKURA -->
  <text x="200" y="260" text-anchor="middle" font-family="'Didot','Georgia','Times',serif" font-weight="400" font-size="36" fill="url(#gold6)" letter-spacing="8">SAKURA</text>

  <!-- Subtitle -->
  <text x="200" y="288" text-anchor="middle" font-family="'Futura','Helvetica Neue',sans-serif" font-weight="300" font-size="10" fill="#D4A84588" letter-spacing="4">INTERNATIONAL SCHOOL</text>

  <!-- Decorative lines -->
  <line x1="110" y1="300" x2="290" y2="300" stroke="url(#gold6)" stroke-width="0.5" opacity="0.4"/>

  <!-- Bottom arc text -->
  <path id="arc6" d="M80,240 A140,140 0 0,0 320,240" fill="none"/>
  <text font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="300" font-size="11" fill="#D4A84555" letter-spacing="1">
    <textPath href="#arc6" startOffset="50%" text-anchor="middle">桜ヶ丘インターナショナルスクール</textPath>
  </text>
</svg>