<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
<defs>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2080D0"/>
      <stop offset="100%" stop-color="#155DA0"/>
    </linearGradient>
  </defs>

  <circle cx="200" cy="200" r="178" fill="#00000022" transform="translate(2,2)"/>
  <circle cx="200" cy="200" r="178" fill="url(#g4)" stroke="#FFFFFF" stroke-width="6"/>
  <circle cx="200" cy="200" r="162" fill="none" stroke="#FFFFFF33" stroke-width="1.5"/>

  <!-- Arc text top: MIYASHITA PARK -->
  <path id="arc4top" d="M80,200 A120,120 0 0,1 320,200" fill="none"/>
  <text font-family="'Futura','Helvetica Neue',sans-serif" font-weight="700" font-size="16" fill="#FFFFFF" letter-spacing="5">
    <textPath href="#arc4top" startOffset="50%" text-anchor="middle">MIYASHITA PARK</textPath>
  </text>

  <!-- Arc text bottom -->
  <path id="arc4bot" d="M85,230 A130,130 0 0,0 315,230" fill="none"/>
  <text font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="400" font-size="14" fill="#FFFFFF99" letter-spacing="2">
    <textPath href="#arc4bot" startOffset="50%" text-anchor="middle">宮下パーク高校</textPath>
  </text>

  <!-- Wing + Board icon -->
  <g transform="translate(200,195)">
    <!-- Wings -->
    <path d="M-15,-10 L-40,-25 L-75,-32 L-95,-28 L-75,-20 L-40,-12 L-20,0 Z" fill="#FFFFFF" opacity="0.9"/>
    <path d="M15,-10 L40,-25 L75,-32 L95,-28 L75,-20 L40,-12 L20,0 Z" fill="#FFFFFF" opacity="0.9"/>
    <!-- Skateboard -->
    <rect x="-45" y="5" width="90" height="12" rx="6" fill="#FFFFFF"/>
    <!-- Wheels -->
    <circle cx="-30" cy="22" r="5" fill="#FFFFFF" stroke="#1570AA" stroke-width="2"/>
    <circle cx="30" cy="22" r="5" fill="#FFFFFF" stroke="#1570AA" stroke-width="2"/>
  </g>

  <!-- MP monogram -->
  <text x="200" y="168" text-anchor="middle" font-family="'Futura','Helvetica Neue',sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" opacity="0.3">MP</text>
</svg>