  <!-- 百実 -->
  <text x="200" y="222" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="900" font-size="42" fill="url(#gold2)" letter-spacing="4">百実</text>

  <!-- Subtitle -->
  <text x="200" y="310" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-weight="300" font-size="12" fill="#D4A84577" letter-spacing="5">HYAKUJITSU</text>

  <!-- Decorative line -->
