      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4A845"/>
      <stop offset="50%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#B8900C"/>
