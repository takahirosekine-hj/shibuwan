  </defs>

  <path d="M200,24 L356,82 L356,240 Q356,336 200,386 Q44,336 44,240 L44,82 Z" fill="#00000044" transform="translate(3,3)"/>
  <path d="M200,20 L360,80 L360,240 Q360,340 200,390 Q40,340 40,240 L40,80 Z" fill="url(#g2)" stroke="url(#gold2)" stroke-width="5"/>
  <path d="M200,34 L348,90 L348,238 Q348,330 200,376 Q52,330 52,238 L52,90 Z" fill="none" stroke="#D4A84533" stroke-width="1.5"/>

  <!-- Crown -->
  <g transform="translate(200,95)" fill="url(#gold2)">
    <path d="M-35,15 L-35,-10 L-22,2 L-10,-18 L0,0 L10,-18 L22,2 L35,-10 L35,15 Z"/>
    <rect x="-35" y="15" width="70" height="8" rx="1"/>
    <!-- Crown jewels -->
    <circle cx="-10" cy="-5" r="3" fill="#CC0000"/>
    <circle cx="10" cy="-5" r="3" fill="#CC0000"/>
    <circle cx="0" cy="-12" r="3" fill="#CC0000"/>
  </g>

  <!-- Diamond frame -->
  <g transform="translate(200,210)" fill="none" stroke="url(#gold2)" stroke-width="2.5">
    <rect x="-55" y="-55" width="110" height="110" rx="3" transform="rotate(45)"/>
